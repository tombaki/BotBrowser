<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; script-src 'self' 'unsafe-inline';" />
  <title>BotBrowser Control</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body class="dark">
  <div id="app">
    <div class="titlebar">
      <div class="titlebar-drag"></div>
      <div class="titlebar-title">
        <img src="../assets/logo.svg" width="18" height="18" class="app-logo-icon" style="border-radius:4px;display:block;" />
        <span>BotBrowser Control</span>
      </div>
      <div class="titlebar-right">
        <button class="theme-btn" id="theme-toggle" title="Toggle theme">
          <svg id="theme-icon-dark" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="theme-icon-light" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav">
          <div class="nav-section">
            <button class="nav-item active" data-nav="profiles" id="nav-profiles">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              <span>Profiles</span>
              <span class="nav-badge" id="badge-profiles"></span>
            </button>
            <button class="nav-item" data-nav="sessions" id="nav-sessions">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
              </svg>
              <span>Sessions</span>
              <span class="nav-badge live" id="badge-sessions" style="display:none"></span>
            </button>
          </div>
          <div class="nav-section nav-section-bottom">
            <button class="nav-item" data-nav="settings" id="nav-settings">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
                <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
              </svg>
              <span>Settings</span>
            </button>
          </div>
        </nav>
        <div class="sidebar-stats">
          <div class="stat-item">
            <span class="stat-value" id="stat-profiles">0</span>
            <span class="stat-label">Profiles</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-dot" id="stat-indicator"></div>
            <span class="stat-value" id="stat-running">0</span>
            <span class="stat-label">Running</span>
          </div>
        </div>
      </aside>

      <main class="content" id="main-content"></main>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    // Theme bootstrap — no flash
    (function() {
      const saved = localStorage.getItem('bb-theme') || 'dark';
      document.body.className = saved;
      function syncIcons() {
        const dark = document.body.classList.contains('dark');
        const di = document.getElementById('theme-icon-dark');
        const li = document.getElementById('theme-icon-light');
        if (di) di.style.display = dark ? '' : 'none';
        if (li) li.style.display = dark ? 'none' : '';
      }
      syncIcons();
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const isDark = document.body.classList.contains('dark');
        document.body.className = isDark ? 'light' : 'dark';
        localStorage.setItem('bb-theme', isDark ? 'light' : 'dark');
        syncIcons();
      });
    })();
  </script>

  <script src="js/app.js"></script>
</body>
</html>
